subprojects {
    apply plugin: "java"

    repositories {
        mavenCentral()
        maven { url "https://maven.fabricmc.net/" }
        maven { url "https://jitpack.io" }
    }

    dependencies {
        implementation "de.javagl:obj:0.4.0"
        implementation "com.formdev:svgSalamander:1.1.4"
        implementation "com.github.selimaj-dev:session-java:0.1.6"
    }
}
