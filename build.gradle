plugins {
    id "fabric-loom" version "1.6-SNAPSHOT" apply false
}

subprojects {
    repositories {
        mavenCentral()
        maven { url "https://maven.fabricmc.net/" }
    }

    dependencies {
    // OBJ Library
    implementation "de.javagl:obj:0.4.0"
    include "de.javagl:obj:0.4.0"

    // SVG Library
    include implementation("com.formdev:svgSalamander:1.1.4")

    // Session (Saturn auth/session handling)
    include implementation("com.github.selimaj-dev:session-java:0.1.6")
    }
}
